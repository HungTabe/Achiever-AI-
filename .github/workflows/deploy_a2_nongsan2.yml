# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy WAR app to Azure Web App - nongsan2

on:
  push:
    branches:
      - Deploy_A2
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Ant
        run: |
          sudo apt-get update
          sudo apt-get install -y ant

      - name: Create custom build script
        run: |
          cat > custom-build.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <project name="CustomBuild" default="build-war" basedir=".">
            <property name="src.dir" value="src/java"/>
            <property name="web.dir" value="web"/>
            <property name="build.dir" value="build"/>
            <property name="classes.dir" value="${build.dir}/classes"/>
            <property name="dist.dir" value="dist"/>
            <property name="war.name" value="Mirella.war"/>
            
            <target name="clean">
              <delete dir="${build.dir}"/>
              <delete dir="${dist.dir}"/>
            </target>
            
            <target name="init">
              <mkdir dir="${build.dir}"/>
              <mkdir dir="${classes.dir}"/>
              <mkdir dir="${dist.dir}"/>
            </target>
            
            <target name="compile" depends="init">
              <javac srcdir="${src.dir}" destdir="${classes.dir}" 
                     classpath="${web.dir}/WEB-INF/lib/*" 
                     includeantruntime="false" 
                     source="17" target="17"/>
            </target>
            
            <target name="build-war" depends="compile">
              <war destfile="${dist.dir}/${war.name}" webxml="${web.dir}/WEB-INF/web.xml">
                <fileset dir="${web.dir}"/>
                <classes dir="${classes.dir}"/>
                <lib dir="${web.dir}/WEB-INF/lib"/>
              </war>
            </target>
          </project>
          EOF

      - name: Build with custom Ant script
        run: |
          cd "${{ github.workspace }}"
          ant -f custom-build.xml clean
          ant -f custom-build.xml build-war

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/dist/*.war'

  deploy:
    runs-on: ubuntu-latest
    needs: build 
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F0BD20F7951F42B281B6719C90E8D78E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_110DF427349642CB9A9E276FCCCE92BB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EF0E113A58394A5893BA0766B794152A }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nongsan2'
          slot-name: 'Production'
          package: '*.war'
          
